{% if messages %}
{% for message in messages %}
<div id="message" class="my-4" aria-live="polite">
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show d-flex justify-content-between align-items-center"
        role="alert">
        <span>{{ message }}</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
</div>
{% endfor %}
{% endif %}
